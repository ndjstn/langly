# =============================================================================
# Pre-commit Configuration for Langly
# =============================================================================
# This configuration runs various code quality checks before each commit.
# Install with: pre-commit install
# Run manually with: pre-commit run --all-files
# =============================================================================

repos:
  # ===========================================================================
  # General Hooks
  # ===========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Prevent large files from being committed
      - id: check-added-large-files
        args: ['--maxkb=1000']
      
      # Check for files with names that would conflict on case-insensitive fs
      - id: check-case-conflict
      
      # Check for files that contain merge conflict strings
      - id: check-merge-conflict
      
      # Check for debugger imports and breakpoint() calls
      - id: debug-statements
      
      # Ensure files end with a newline
      - id: end-of-file-fixer
      
      # Remove trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      
      # Check YAML files for syntax
      - id: check-yaml
        args: [--unsafe]  # Allow custom tags
      
      # Check TOML files for syntax
      - id: check-toml
      
      # Check JSON files for syntax
      - id: check-json
      
      # Validate Python AST
      - id: check-ast
      
      # Check for private keys
      - id: detect-private-key
      
      # Check shebang scripts are executable
      - id: check-shebang-scripts-are-executable
      
      # Sort requirements files
      - id: requirements-txt-fixer

  # ===========================================================================
  # Python Code Formatting - Ruff
  # ===========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.3
    hooks:
      # Linting
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      
      # Formatting
      - id: ruff-format
        types_or: [python, pyi]

  # ===========================================================================
  # Python Code Formatting - Black (backup/verification)
  # ===========================================================================
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length=79]
        language_version: python3.12

  # ===========================================================================
  # Import Sorting - isort
  # ===========================================================================
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=79]

  # ===========================================================================
  # Type Checking - MyPy
  # ===========================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies:
          - pydantic>=2.10.0
          - pydantic-settings>=2.6.0
          - fastapi>=0.115.0
          - types-requests
        pass_filenames: false
        entry: mypy app/
        # Don't fail commit on type errors during development
        verbose: true

  # ===========================================================================
  # Security Scanning - Bandit
  # ===========================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-r, -c, pyproject.toml, -q]
        exclude: tests/

  # ===========================================================================
  # Docstring Checking - pydocstyle
  # ===========================================================================
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: [--convention=google]
        additional_dependencies: [tomli]
        exclude: (tests/|conftest\.py)
        # Only warn, don't fail
        verbose: true

  # ===========================================================================
  # Commit Message Linting
  # ===========================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.0.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ===========================================================================
  # Shell Script Linting
  # ===========================================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # ===========================================================================
  # Markdown Linting
  # ===========================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--fix, --disable, MD013, MD033, MD041]

  # ===========================================================================
  # Secrets Detection
  # ===========================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: (\.lock|\.env\.example)$

# ===========================================================================
# CI Configuration
# ===========================================================================
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [mypy, bandit]  # Skip slower checks in CI
  submodules: false
